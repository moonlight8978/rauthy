name: Release new tag

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Login to assistant app
        id: ghapp-auth
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.ASSISTANT_APP_ID }}
          private-key: ${{ secrets.ASSISTANT_APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.ghapp-auth.outputs.token }}

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ steps.ghapp-auth.outputs.token }}
          GIT_AUTHOR_NAME: '${{ steps.ghapp-auth.outputs.app-slug }}[bot]'
          GIT_AUTHOR_EMAIL: '${{ steps.ghapp-auth.outputs.user-id }}+${{ steps.ghapp-auth.outputs.app-slug }}[bot]@users.noreply.github.com'
          GIT_COMMITTER_NAME: '${{ steps.ghapp-auth.outputs.app-slug }}[bot]'
          GIT_COMMITTER_EMAIL: '${{ steps.ghapp-auth.outputs.user-id }}+${{ steps.ghapp-auth.outputs.app-slug }}[bot]@users.noreply.github.com'
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits
            @semantic-release/changelog
            @semantic-release/git

