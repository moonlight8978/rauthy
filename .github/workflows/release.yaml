name: Release new tag

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Login to assistant app
        id: ghapp-auth
        uses: moonlight8978/actions/github-app-login@latest
        with:
          app-id: ${{ vars.ASSISTANT_APP_ID }}
          private-key: ${{ secrets.ASSISTANT_APP_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ steps.ghapp-auth.outputs.token }}

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ steps.ghapp-auth.outputs.token }}
          GIT_AUTHOR_NAME: ${{ steps.ghapp-auth.outputs.bot-name }}
          GIT_AUTHOR_EMAIL: ${{ steps.ghapp-auth.outputs.bot-email }}
          GIT_COMMITTER_NAME: ${{ steps.ghapp-auth.outputs.bot-name }}
          GIT_COMMITTER_EMAIL: ${{ steps.ghapp-auth.outputs.bot-email }}
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits
            @semantic-release/changelog
            @semantic-release/git

